name: Test Weather Skill

on:
  workflow_dispatch:
  push:
    paths:
      - 'weather/SKILL.md'

jobs:
  test-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Show available tools
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: copilot --help || true

      - name: Run weather skill for Bodmin, Cornwall
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          METEOBLUE_API_KEY: ${{ secrets.METEOBLUE_API_KEY }}
        run: |
          copilot \
            --allow-tool=shell \
            --allow-tool=fetch \
            --allow-url=my.meteoblue.com \
            --allow-url=nominatim.openstreetmap.org \
            --no-ask-user \
            -p "Use the meteoblue weather skill in weather/SKILL.md to get the forecast for Bodmin, Cornwall. The METEOBLUE_API_KEY environment variable is already set."
