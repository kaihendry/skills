name: Test Weather Skill

on:
  workflow_dispatch:
  push:
    paths:
      - 'weather/SKILL.md'

jobs:
  test-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run weather skill for Bodmin, Cornwall
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Use the meteoblue weather skill (weather/SKILL.md) to get the forecast for Bodmin, Cornwall."
          claude_args: "--allowedTools Bash(curl:*)"
        env:
          METEOBLUE_API_KEY: ${{ secrets.METEOBLUE_API_KEY }}
